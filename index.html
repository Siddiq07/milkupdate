<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Milk Daily Summary</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f8;
    padding:20px;
}
h2{text-align:center;margin-bottom:20px;}
.top-bar{
    display:flex;
    gap:10px;
    margin-bottom:20px;
    flex-wrap:wrap;
}
input[type="text"]{
    padding:8px;
    flex:1;
    min-width:200px;
}
button{
    padding:8px 15px;
    border:none;
    background:#2e7d32;
    color:white;
    border-radius:5px;
    cursor:pointer;
}
.client{
    background:white;
    padding:15px;
    margin-bottom:15px;
    border-radius:8px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
table{
    width:100%;
    border-collapse:collapse;
}
th, td{
    border:1px solid #ddd;
    padding:6px;
    text-align:center;
}
th{background:#eeeeee;}
.qty{width:60px;}
.unit{width:60px;}
</style>
</head>

<body>

<h2>🥛 Milk Daily Summary</h2>

<div class="top-bar">
    <input type="text" id="clientName" placeholder="Enter Client Name">
    <button onclick="addClient()">+ Add Client</button>
    <button onclick="sendWhatsApp()">📲 Send WhatsApp</button>
</div>

<div id="clients"></div>

<script>

// 🔥 Firebase Config
const firebaseConfig = {
    databaseURL: "https://milk-7bb9b-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Add Client
function addClient(){
    let name = document.getElementById("clientName").value.trim();
    if(!name) return alert("Enter client name");

    db.ref("clients").push({
        name:name,
        green:0,
        blue:0,
        red:0,
        curd:0,
        thick:0
    });

    document.getElementById("clientName").value="";
}

// Real-time listener
db.ref("clients").on("value", snapshot => {
    let data = snapshot.val();
    let container = document.getElementById("clients");
    container.innerHTML="";

    for(let id in data){
        let c = data[id];

        container.innerHTML += `
        <div class="client">
            <h3>${c.name}</h3>
            <table>
                <tr>
                    <th>Product</th>
                    <th>Qty</th>
                    <th>Unit</th>
                </tr>
                ${row("Green", c.green, id, "green")}
                ${row("Blue", c.blue, id, "blue")}
                ${row("Red", c.red, id, "red")}
                ${row("Curd", c.curd, id, "curd")}
                ${row("Thick Curd", c.thick, id, "thick")}
            </table>
        </div>
        `;
    }
});

// Row generator
function row(product, value, id, field){
    return `
    <tr>
        <td>${product}</td>
        <td>
            <input type="number" class="qty" value="${value}" 
            onchange="updateValue('${id}','${field}',this.value)">
        </td>
        <td>
            <select class="unit">
                <option value="B">B</option>
                <option value="L">L</option>
            </select>
        </td>
    </tr>
    `;
}

// Update quantity in database
function updateValue(id, field, value){
    db.ref("clients/"+id+"/"+field).set(Number(value));
}

// WhatsApp Sender
function sendWhatsApp(){

    db.ref("clients").once("value").then(snapshot => {

        let data = snapshot.val();
        let message="";

        let today = new Date();
        let date = today.toLocaleDateString("en-GB");

        message += "*Milk Report*\n";
        message += "Date: "+date+"\n\n";

        for(let id in data){

            let c = data[id];
            let clientData="";

            if(c.green>0) clientData+="Green "+c.green+" Box\n";
            if(c.blue>0) clientData+="Blue "+c.blue+" Box\n";
            if(c.red>0) clientData+="Red "+c.red+" Box\n";
            if(c.curd>0) clientData+="Curd "+c.curd+" Litre\n";
            if(c.thick>0) clientData+="Thick Curd "+c.thick+" Litre\n";

            if(clientData!=""){
                message+="*"+c.name+"*\n";
                message+=clientData+"\n";
            }
        }

        let phone="8497083674";
        let url="https://wa.me/91"+phone+"?text="+encodeURIComponent(message);
        window.open(url,"_blank");

    });
}

</script>

</body>
</html>
