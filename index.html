<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Milk Daily System</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body{font-family:system-ui;background:#eef2f7;padding:20px;}
h2{text-align:center;}
.card{
  background:white;
  padding:15px;
  margin-bottom:15px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}
.row{
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
}
input,select{
  padding:6px;
  border:1px solid #ddd;
  border-radius:6px;
}
button{
  padding:8px 14px;
  background:#1565c0;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
.summary{
  background:#e3f2fd;
  padding:10px;
  border-radius:10px;
  font-weight:500;
}
</style>
</head>
<body>

<h2>🥛 Milk Daily System</h2>

<div class="card">
<h3 id="dateTitle"></h3>
<div id="stockSection"></div>
<button onclick="saveStock()">Save Stock</button>
<button onclick="sendWhatsApp()">Send Report</button>
</div>

<div class="summary" id="summary"></div>

<div class="card">
<input type="text" id="clientName" placeholder="New Client Name">
<button onclick="addClient()">Add Client</button>
</div>

<div id="clients"></div>

<script>

firebase.initializeApp({
  apiKey: "AIzaSyCnLHWvXBIBFaQ9s6S_gCN9jJFG6oWDetk",
  authDomain: "milk-7bb9b.firebaseapp.com",
  databaseURL: "https://milk-7bb9b-default-rtdb.firebaseio.com",
  projectId: "milk-7bb9b"
});

const db=firebase.database();
const PRODUCTS=["green","blue","red","curd","thick"];
const BOX_LITRE={green:12,blue:12,red:12,curd:15,thick:12};

let todayDate=new Date().toLocaleDateString("en-GB");
document.getElementById("dateTitle").innerText="Date: "+todayDate;

// -------- BUILD STOCK --------
const stockSection=document.getElementById("stockSection");
PRODUCTS.forEach(p=>{
  stockSection.innerHTML+=`
  <div class="row">
    <div>${capitalize(p)}</div>
    <div>
      <input id="stock_${p}_qty" value="0">
      <select id="stock_${p}_unit">
        <option value="B" selected>B</option>
        <option value="L">L</option>
      </select>
    </div>
  </div>`;
});

// -------- SAVE STOCK --------
function saveStock(){
  let stock={};
  PRODUCTS.forEach(p=>{
    stock[p]={
      qty:Number(document.getElementById("stock_"+p+"_qty").value)||0,
      unit:document.getElementById("stock_"+p+"_unit").value
    };
  });
  db.ref("reports/"+todayDate+"/stock").set(stock);
}

// -------- ADD CLIENT (PERMANENT) --------
function addClient(){
  let name=clientName.value.trim();
  if(!name) return;

  db.ref("clients").push({name:name});
  clientName.value="";
}

// -------- UPDATE DAILY QTY --------
function updateDaily(clientId,key){
  db.ref("reports/"+todayDate+"/clients/"+clientId+"/"+key).set({
    qty:Number(document.getElementById(clientId+"_"+key+"_qty").value)||0,
    unit:document.getElementById(clientId+"_"+key+"_unit").value
  });
}

// -------- LOAD CLIENTS (PERMANENT) --------
db.ref("clients").on("value",snap=>{
  let clientData=snap.val();
  let container=document.getElementById("clients");
  container.innerHTML="";

  if(!clientData) return;

  for(let id in clientData){
    container.innerHTML+=`
    <div class="card">
    <b>${clientData[id].name}</b>
    ${PRODUCTS.map(p=>clientRow(id,p)).join("")}
    </div>`;
  }
});

// -------- LOAD DAILY DATA --------
db.ref("reports/"+todayDate).on("value",snap=>{
  let data=snap.val()||{};
  let supplied={green:0,blue:0,red:0,curd:0,thick:0};

  if(data.clients){
    for(let clientId in data.clients){
      PRODUCTS.forEach(p=>{
        let item=data.clients[clientId][p];
        if(item){
          let litre=item.unit==="B"
            ? item.qty*BOX_LITRE[p]
            : item.qty;
          supplied[p]+=litre;

          // Update input fields
          let qtyField=document.getElementById(clientId+"_"+p+"_qty");
          let unitField=document.getElementById(clientId+"_"+p+"_unit");
          if(qtyField){
            qtyField.value=item.qty;
            unitField.value=item.unit;
          }
        }
      });
    }
  }

  summary.innerHTML="Balance (L) → "+
  PRODUCTS.map(p=>{
    let stock=data.stock?.[p];
    let stockL=0;
    if(stock){
      stockL=stock.unit==="B"
        ? stock.qty*BOX_LITRE[p]
        : stock.qty;
    }
    return capitalize(p)+": "+(stockL-supplied[p]);
  }).join(" | ");
});

// -------- WHATSAPP --------
function sendWhatsApp(){
  db.ref("reports/"+todayDate).once("value").then(snap=>{
    let data=snap.val();
    if(!data) return;

    let msg="*Milk Report*\nDate: "+todayDate+"\n\n";

    db.ref("clients").once("value").then(clientSnap=>{
      let clientData=clientSnap.val();

      for(let clientId in clientData){
        let name=clientData[clientId].name;
        let block="";

        PRODUCTS.forEach(p=>{
          let item=data.clients?.[clientId]?.[p];
          if(item && item.qty>0){
            block+=capitalize(p)+" "+item.qty+" "+item.unit+"\n";
          }
        });

        if(block!=""){
          msg+="*"+name+"*\n"+block+"\n";
        }
      }

      window.open("https://wa.me/919449244108?text="+encodeURIComponent(msg));
    });
  });
}

function clientRow(clientId,key){
  return `
  <div class="row">
    <div>${capitalize(key)}</div>
    <div>
      <input id="${clientId}_${key}_qty"
        value="0"
        onchange="updateDaily('${clientId}','${key}')">
      <select id="${clientId}_${key}_unit"
        onchange="updateDaily('${clientId}','${key}')">
        <option value="B">B</option>
        <option value="L">L</option>
      </select>
    </div>
  </div>`;
}

function capitalize(str){
  return str.charAt(0).toUpperCase()+str.slice(1);
}

</script>
</body>
</html>
