<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Milk Report</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body{
    font-family: Arial;
    background:#f5f7fa;
    padding:20px;
}
h2{text-align:center;}
.top-bar{
    display:flex;
    gap:10px;
    margin-bottom:20px;
    flex-wrap:wrap;
}
input[type="text"]{
    padding:8px;
    flex:1;
    min-width:200px;
}
button{
    padding:8px 15px;
    border:none;
    background:#1b5e20;
    color:white;
    border-radius:5px;
    cursor:pointer;
}
.client{
    background:white;
    padding:15px;
    margin-bottom:15px;
    border-radius:8px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
table{
    width:100%;
    border-collapse:collapse;
}
th, td{
    border:1px solid #ddd;
    padding:6px;
    text-align:center;
}
th{background:#eeeeee;}
.qty{width:60px;}
.unit{width:70px;}
</style>
</head>

<body>

<h2>🥛 Milk Daily Summary</h2>

<div class="top-bar">
    <input type="text" id="clientName" placeholder="Enter Client Name">
    <button onclick="addClient()">+ Add Client</button>
    <button onclick="sendWhatsApp()">📲 Send WhatsApp</button>
</div>

<div id="clients"></div>

<script>

// 🔥 Firebase Config
firebase.initializeApp({
    databaseURL: "https://milk-7bb9b-default-rtdb.firebaseio.com"
});
const db = firebase.database();

// ➕ Add Client
function addClient(){
    let name = document.getElementById("clientName").value.trim();
    if(!name) return alert("Enter client name");

    db.ref("clients").push({
        name:name,
        products:{
            green:{qty:0, unit:"B"},
            blue:{qty:0, unit:"B"},
            red:{qty:0, unit:"B"},
            curd:{qty:0, unit:"L"},
            thick:{qty:0, unit:"L"}
        }
    });

    document.getElementById("clientName").value="";
}

// 🔄 Real-time Load
db.ref("clients").on("value", snapshot=>{
    let data = snapshot.val();
    let container = document.getElementById("clients");
    container.innerHTML="";

    if(!data) return;

    for(let id in data){

        let c = data[id];
        let p = c.products;

        container.innerHTML += `
        <div class="client">
            <h3>${c.name}</h3>
            <table>
                <tr>
                    <th>Product</th>
                    <th>Qty</th>
                    <th>Unit</th>
                </tr>
                ${row("Green", p.green, id, "green")}
                ${row("Blue", p.blue, id, "blue")}
                ${row("Red", p.red, id, "red")}
                ${row("Curd", p.curd, id, "curd")}
                ${row("Thick Curd", p.thick, id, "thick")}
            </table>
        </div>
        `;
    }
});

// 🧾 Row Builder
function row(name, data, id, key){
    return `
    <tr>
        <td>${name}</td>
        <td>
            <input type="number" class="qty" value="${data.qty}"
            onchange="updateQty('${id}','${key}',this.value)">
        </td>
        <td>
            <select class="unit"
            onchange="updateUnit('${id}','${key}',this.value)">
                <option value="B" ${data.unit==="B"?"selected":""}>B</option>
                <option value="L" ${data.unit==="L"?"selected":""}>L</option>
            </select>
        </td>
    </tr>
    `;
}

// 🔄 Update Qty
function updateQty(id,key,value){
    db.ref("clients/"+id+"/products/"+key+"/qty").set(Number(value));
}

// 🔄 Update Unit
function updateUnit(id,key,value){
    db.ref("clients/"+id+"/products/"+key+"/unit").set(value);
}

// 📲 WhatsApp Sender (FIXED ORDER)
function sendWhatsApp(){

    db.ref("clients").once("value").then(snapshot=>{

        let data = snapshot.val();
        if(!data) return alert("No data");

        let message="";
        let today = new Date().toLocaleDateString("en-GB");

        message += "*Milk Report*\n";
        message += "Date: "+today+"\n\n";

        for(let id in data){

            let c = data[id];
            let p = c.products;
            let block="";

            // 🔥 FIXED ORDER
            let order = ["green","blue","red","curd","thick"];

            order.forEach(key => {

                if(p[key] && p[key].qty > 0){

                    let unit = p[key].unit==="B" ? "Box" : "Litre";
                    let name = key==="thick" ? "Thick Curd" :
                               key.charAt(0).toUpperCase()+key.slice(1);

                    block += name+" "+p[key].qty+" "+unit+"\n";
                }

            });

            if(block!=""){
                message += "*"+c.name+"*\n";
                message += block+"\n";
            }
        }

        let url="https://wa.me/919449244108?text="+encodeURIComponent(message);
        window.open(url,"_blank");

    });
}

</script>

</body>
</html>
