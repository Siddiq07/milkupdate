<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Milk Business System</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body{font-family:Arial;background:#f4f6f8;padding:20px;}
h2{text-align:center;}
.section{background:white;padding:15px;margin-bottom:15px;border-radius:8px;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{border:1px solid #ddd;padding:6px;text-align:center;}
input{width:70px;padding:4px;}
select{padding:4px;}
button{padding:8px 15px;background:#1b5e20;color:white;border:none;border-radius:5px;cursor:pointer;margin-top:10px;}
.summary{background:#fff3e0;padding:10px;border-radius:8px;margin-bottom:15px;}
</style>
</head>
<body>

<h2>🥛 Milk Business System</h2>

<!-- STOCK SECTION -->
<div class="section">
<h3>Daily Stock</h3>
<table>
<tr><th>Product</th><th>Box</th><th>Litre</th></tr>

<tr><td>Green</td>
<td><input id="stock_green_box" onchange="convertStock('green')"></td>
<td><input id="stock_green_litre" onchange="reverseStock('green')"></td></tr>

<tr><td>Blue</td>
<td><input id="stock_blue_box" onchange="convertStock('blue')"></td>
<td><input id="stock_blue_litre" onchange="reverseStock('blue')"></td></tr>

<tr><td>Red</td>
<td><input id="stock_red_box" onchange="convertStock('red')"></td>
<td><input id="stock_red_litre" onchange="reverseStock('red')"></td></tr>

<tr><td>Curd (15L/Box)</td>
<td><input id="stock_curd_box" onchange="convertStock('curd')"></td>
<td><input id="stock_curd_litre" onchange="reverseStock('curd')"></td></tr>

<tr><td>Thick</td>
<td><input id="stock_thick_box" onchange="convertStock('thick')"></td>
<td><input id="stock_thick_litre" onchange="reverseStock('thick')"></td></tr>

</table>
<button onclick="saveStock()">Save Stock</button>
<button onclick="sendWhatsApp()">📲 Send Report</button>
</div>

<div class="summary" id="summary"></div>

<!-- ADD CLIENT -->
<div class="section">
<input type="text" id="clientName" placeholder="Add Client Name">
<button onclick="addClient()">+ Add Client</button>
</div>

<div id="clients"></div>

<script>

firebase.initializeApp({
  apiKey: "AIzaSyCnLHWvXBIBFaQ9s6S_gCN9jJFG6oWDetk",
  authDomain: "milk-7bb9b.firebaseapp.com",
  databaseURL: "https://milk-7bb9b-default-rtdb.firebaseio.com",
  projectId: "milk-7bb9b"
});

const db = firebase.database();

const BOX_LITRE = {
  green:12,
  blue:12,
  red:12,
  curd:15,
  thick:12
};

function todayKey(){
  return new Date().toLocaleDateString("en-GB");
}

// ================= STOCK =================
function convertStock(key){
  let box = Number(document.getElementById("stock_"+key+"_box").value)||0;
  document.getElementById("stock_"+key+"_litre").value = box * BOX_LITRE[key];
}
function reverseStock(key){
  let litre = Number(document.getElementById("stock_"+key+"_litre").value)||0;
  document.getElementById("stock_"+key+"_box").value = (litre / BOX_LITRE[key]).toFixed(2);
}
function saveStock(){
  let stock={
    green:Number(stock_green_litre.value)||0,
    blue:Number(stock_blue_litre.value)||0,
    red:Number(stock_red_litre.value)||0,
    curd:Number(stock_curd_litre.value)||0,
    thick:Number(stock_thick_litre.value)||0
  };
  db.ref("dailyReports/"+todayKey()+"/stock").set(stock);
}

// ================= CLIENT =================
function addClient(){
  let name=document.getElementById("clientName").value.trim();
  if(!name) return;

  db.ref("dailyReports/"+todayKey()+"/clients").push({
    name:name,
    green:{qty:0,unit:"box"},
    blue:{qty:0,unit:"box"},
    red:{qty:0,unit:"box"},
    curd:{qty:0,unit:"box"},
    thick:{qty:0,unit:"box"}
  });

  document.getElementById("clientName").value="";
}

// Update client
function updateClient(id,key,qty,unit){
  db.ref("dailyReports/"+todayKey()+"/clients/"+id+"/"+key).set({
    qty:Number(qty)||0,
    unit:unit
  });
}

// REALTIME LOAD
db.ref("dailyReports/"+todayKey()).on("value",snap=>{
  let data=snap.val();
  if(!data) return;

  let stock=data.stock||{};
  stock_green_litre.value=stock.green||0;
  stock_blue_litre.value=stock.blue||0;
  stock_red_litre.value=stock.red||0;
  stock_curd_litre.value=stock.curd||0;
  stock_thick_litre.value=stock.thick||0;

  reverseStock("green");
  reverseStock("blue");
  reverseStock("red");
  reverseStock("curd");
  reverseStock("thick");

  let supplied={green:0,blue:0,red:0,curd:0,thick:0};
  let container=document.getElementById("clients");
  container.innerHTML="";

  if(data.clients){
    for(let id in data.clients){
      let c=data.clients[id];

      container.innerHTML+=`
      <div class="section">
      <h3>${c.name}</h3>
      ${clientRow(id,"Green",c.green,"green")}
      ${clientRow(id,"Blue",c.blue,"blue")}
      ${clientRow(id,"Red",c.red,"red")}
      ${clientRow(id,"Curd",c.curd,"curd")}
      ${clientRow(id,"Thick",c.thick,"thick")}
      </div>
      `;

      for(let p in supplied){
        let item=c[p];
        if(item){
          let litre = item.unit==="box"
              ? item.qty * BOX_LITRE[p]
              : item.qty;
          supplied[p]+=litre;
        }
      }
    }
  }

  let balance={
    green:(stock.green||0)-supplied.green,
    blue:(stock.blue||0)-supplied.blue,
    red:(stock.red||0)-supplied.red,
    curd:(stock.curd||0)-supplied.curd,
    thick:(stock.thick||0)-supplied.thick
  };

  document.getElementById("summary").innerHTML=
  `<b>Balance (Litre)</b><br>
  Green: ${balance.green} |
  Blue: ${balance.blue} |
  Red: ${balance.red} |
  Curd: ${balance.curd} |
  Thick: ${balance.thick}`;
});

function clientRow(id,label,data,key){
  return `
  <table>
  <tr>
  <td>${label}</td>
  <td><input value="${data?.qty||0}"
      onchange="updateClient('${id}','${key}',this.value,
      document.getElementById('${id}_${key}_unit').value)"></td>
  <td>
    <select id="${id}_${key}_unit"
      onchange="updateClient('${id}','${key}',
      document.querySelector('[onchange*=${id}]').value,this.value)">
      <option value="box" ${data?.unit==="box"?"selected":""}>Box</option>
      <option value="litre" ${data?.unit==="litre"?"selected":""}>Litre</option>
    </select>
  </td>
  </tr>
  </table>
  `;
}

// ================= WHATSAPP =================
function sendWhatsApp(){
  db.ref("dailyReports/"+todayKey()).once("value").then(snap=>{
    let data=snap.val();
    if(!data) return;

    let message="*Milk Report*\nDate: "+todayKey()+"\n\n";

    for(let id in data.clients){
      let c=data.clients[id];
      let block="";

      ["green","blue","red","curd","thick"].forEach(p=>{
        let item=c[p];
        if(item && item.qty>0){
          let litre=item.unit==="box"
              ? item.qty*BOX_LITRE[p]
              : item.qty;
          block+=p.charAt(0).toUpperCase()+p.slice(1)
          +" "+item.qty+" "+(item.unit==="box"?"Box":"Litre")
          +" ("+litre+" L)\n";
        }
      });

      if(block!=""){
        message+="*"+c.name+"*\n"+block+"\n";
      }
    }

    window.open("https://wa.me/918497083674?text="+encodeURIComponent(message));
  });
}

</script>
</body>
</html>
